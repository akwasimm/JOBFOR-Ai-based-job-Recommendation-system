version: '3.8'

services:
  # ─── PostgreSQL Database ─────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: jobsearch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobsearch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Cache ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jobsearch-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API (Node.js / Express) ─────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobsearch-api
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/jobsearch
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  # ─── Frontend (React / Vite → served by Nginx) ───────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobsearch-frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - api

  # ─── Python ML Service ───────────────────────────────
  ml:
    build:
      context: ./backend/ml
      dockerfile: Dockerfile.ml
    container_name: jobsearch-ml
    restart: unless-stopped
    ports:
      - '5000:5000'

volumes:
  postgres_data:
  redis_data:
  uploads_data:
